<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offer Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--card:#fff;--text:#1c1e21;--text2:#606770;--border:#dce1e7;
  --accent:#1877f2;--accent2:#e7f3ff;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,.1);
  --green:#42b883;--red:#e53935;--orange:#fb8c00;
}
.dark{--bg:#18191a;--card:#242526;--text:#e4e6ea;--text2:#b0b3b8;--border:#3a3b3c;--accent2:#263951;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topnav{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:56px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.nav-logo{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-.5px;white-space:nowrap}
.nav-logo span{color:var(--text2);font-weight:400}
.nav-tabs{display:flex;gap:4px;flex:1}
.tab-btn{padding:6px 14px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--accent2);color:var(--accent)}
.tab-btn:hover:not(.active){background:var(--bg)}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.count-badge{background:var(--accent);color:#fff;border-radius:99px;font-size:11px;font-weight:700;padding:2px 8px;min-width:22px;text-align:center}
.theme-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.theme-btn:hover{background:var(--bg)}
.search-wrap{position:relative;flex:1;max-width:280px}
.search-wrap input{width:100%;padding:7px 12px 7px 32px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;pointer-events:none}
.grid-wrap{padding:20px 16px;max-width:1400px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.hub-card{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--border);transition:box-shadow .2s}
.hub-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.14)}
.card-head{display:flex;align-items:center;gap:10px;padding:12px 12px 8px}
.card-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0;letter-spacing:-.5px;overflow:hidden}
.card-meta{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.card-sub{font-size:11.5px;color:var(--text2)}
.card-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.adlib-btn{font-size:11px;font-weight:700;padding:5px 10px;border:none;border-radius:6px;background:#e7f3ff;color:#1877f2;cursor:pointer;text-decoration:none;white-space:nowrap;transition:all .15s}
.adlib-btn:hover{background:#1877f2;color:#fff}
.card-media{width:100%;background:#000;max-height:340px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-media img{width:100%;max-height:340px;object-fit:contain;display:block}
.card-media video{width:100%;max-height:340px;display:block;object-fit:contain}
.card-copy{padding:10px 12px 6px;font-size:14px;line-height:1.45;color:var(--text);white-space:pre-wrap;word-break:break-word}
.card-copy.truncated{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.see-more{padding:0 12px 6px;font-size:13px;color:var(--accent);cursor:pointer;font-weight:600;background:none;border:none;text-align:left}
.see-more:hover{text-decoration:underline}
.card-link{margin:0 12px 8px;border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;align-items:stretch;cursor:pointer;background:var(--bg);transition:background .15s}
.card-link:hover{background:var(--border)}
.link-left{flex:1;padding:10px 12px}
.link-domain{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.link-title{font-size:13.5px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.link-desc{font-size:12px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.link-cta{background:var(--border);color:var(--text);font-size:13px;font-weight:700;padding:0 14px;display:flex;align-items:center;flex-shrink:0;border-left:1px solid var(--border)}
.card-foot{padding:8px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--border);margin-top:auto}
.platform-tag{font-size:11px;padding:3px 8px;border-radius:99px;background:var(--accent2);color:var(--accent);font-weight:600}
.card-date{font-size:11px;color:var(--text2);margin-left:auto}
.save-btn{font-size:12px;font-weight:700;padding:5px 12px;border:none;border-radius:6px;background:var(--green);color:#fff;cursor:pointer;transition:all .15s;margin-left:auto}
.save-btn:hover{opacity:.85}
.save-btn.saved{background:var(--border);color:var(--text2);cursor:default}
.delete-btn{font-size:11px;font-weight:700;padding:5px 10px;border:1px solid var(--red);border-radius:6px;background:transparent;color:var(--red);cursor:pointer;transition:all .15s}
.delete-btn:hover{background:var(--red);color:#fff}
.icon-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;text-decoration:none}
.icon-btn:hover{background:var(--bg);color:var(--text)}
.ai-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.ai-overlay.open{display:flex}
.ai-panel{background:var(--card);border-radius:16px;width:min(600px,95vw);max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.ai-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.ai-head h3{flex:1;font-size:16px;font-weight:700}
.ai-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:4px;line-height:1}
.ai-body{flex:1;overflow-y:auto;padding:16px 20px}
.ai-foot{padding:12px 20px;border-top:1px solid var(--border)}
.ai-foot textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:vertical;min-height:60px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.ai-foot textarea:focus{border-color:var(--accent)}
.ai-send{margin-top:8px;padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:all .15s}
.ai-send:hover{opacity:.9}
.ai-msg{padding:10px 14px;border-radius:10px;font-size:14px;line-height:1.5;margin-bottom:8px}
.ai-msg.user{background:var(--accent);color:#fff;margin-left:20%}
.ai-msg.assistant{background:var(--bg);color:var(--text);margin-right:20%}
.ai-loading{text-align:center;color:var(--text2);font-size:13px;padding:12px}
.vid-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center}
.vid-overlay.open{display:flex}
.vid-panel{position:relative;max-width:900px;width:95vw}
.vid-panel video{width:100%;border-radius:12px;max-height:80vh}
.vid-close{position:absolute;top:-40px;right:0;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty p{font-size:14px;line-height:1.5;max-width:360px;margin:0 auto}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#1c1e21;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.filters{padding:0 16px 12px;max-width:1400px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-chip{padding:5px 12px;border:1px solid var(--border);border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);color:var(--text2);transition:all .15s;white-space:nowrap}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-chip:hover:not(.active){background:var(--bg)}
.sort-select{padding:5px 10px;border:1px solid var(--border);border-radius:99px;font-size:12px;font-weight:600;background:var(--card);color:var(--text);cursor:pointer;outline:none}
.import-label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:14px}
.import-input{width:100%;margin-top:5px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;display:block;resize:vertical}
.import-input:focus{border-color:var(--accent)}
@media(max-width:600px){
  .topnav{padding:0 10px;gap:8px;height:50px}
  .nav-logo{font-size:16px}
  .tab-btn{padding:5px 10px;font-size:12px}
  .grid{grid-template-columns:1fr}
  .grid-wrap{padding:12px 10px}
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-logo">Offer<span>Hub</span></div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('queue')" id="tab-queue">&#128706; Fila</button>
    <button class="tab-btn" onclick="switchTab('saved')" id="tab-saved">&#11088; Salvos</button>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" placeholder="Buscar anuncios..." id="search-input" oninput="onSearch(this.value)">
    </div>
    <span class="count-badge" id="count-badge">0</span>
    <button class="theme-btn" onclick="openImport()" title="Adicionar manualmente">&#10133;</button>
    <button class="theme-btn" onclick="toggleTheme()" title="Alternar tema">&#127769;</button>
  </div>
</nav>

<div class="filters" id="filters-bar">
  <span style="font-size:12px;font-weight:700;color:var(--text2)">Filtrar:</span>
  <button class="filter-chip active" onclick="setFilter('all',this)">Todos</button>
  <button class="filter-chip" onclick="setFilter('video',this)">&#127916; Video</button>
  <button class="filter-chip" onclick="setFilter('image',this)">&#128444; Imagem</button>
  <select class="sort-select" id="sort-select" onchange="onSort(this.value)">
    <option value="newest">Mais recentes</option>
    <option value="oldest">Mais antigos</option>
    <option value="az">A-Z</option>
  </select>
</div>

<div class="grid-wrap">
  <div class="grid" id="ads-grid"></div>
</div>

<div class="ai-overlay" id="ai-overlay" onclick="closeAI(event)">
  <div class="ai-panel">
    <div class="ai-head">
      <span style="font-size:22px">&#129302;</span>
      <h3 id="ai-title">Analise de Anuncio</h3>
      <button class="ai-close" onclick="closeAI()">x</button>
    </div>
    <div class="ai-body" id="ai-body"></div>
    <div class="ai-foot">
      <textarea id="ai-input" placeholder="Pergunte algo sobre este anuncio..." rows="2"></textarea>
      <button class="ai-send" onclick="sendAIMsg()">Enviar</button>
    </div>
  </div>
</div>

<div class="vid-overlay" id="vid-overlay" onclick="closeVid(event)">
  <div class="vid-panel">
    <button class="vid-close" onclick="closeVid()">x</button>
    <video id="vid-player" controls playsinline></video>
  </div>
</div>

<div class="ai-overlay" id="import-overlay" onclick="closeImport(event)">
  <div class="ai-panel" style="max-width:460px">
    <div class="ai-head">
      <span style="font-size:22px">&#10133;</span>
      <h3>Adicionar Anuncio</h3>
      <button class="ai-close" onclick="closeImport()">x</button>
    </div>
    <div class="ai-body">
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Cole o link do Ad Library. Os outros campos sao opcionais.</p>
      <label class="import-label">URL do Ad Library *
        <input type="text" id="import-url" class="import-input" placeholder="https://www.facebook.com/ads/library/?id=...">
      </label>
      <label class="import-label">Nome do anunciante
        <input type="text" id="import-name" class="import-input" placeholder="Ex: Nubank, iFood...">
      </label>
      <label class="import-label">Texto do anuncio
        <textarea id="import-copy" class="import-input" rows="3" placeholder="Cole o texto aqui..."></textarea>
      </label>
    </div>
    <div class="ai-foot">
      <button class="ai-send" onclick="submitImport()">Adicionar a fila</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var S = { tab:'queue', filter:'all', sort:'newest', search:'', queueAds:[], savedAds:[], currentAI:null, aiMessages:[] };

function e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,dur){
  dur=dur||2500;
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, dur);
}

function imgFail(img){
  img.style.display='none';
  var p=img.parentElement;
  if(p){ p.textContent=p.dataset.initials||'?'; }
}

function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light');
  document.querySelector('.theme-btn:last-child').textContent = document.body.classList.contains('dark')?'sunny':'moon';
}
if(localStorage.getItem('theme')==='dark'){
  document.body.classList.add('dark');
}

function switchTab(tab){
  S.tab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-'+tab).classList.add('active');
  renderGrid();
}

function setFilter(f,el){
  S.filter=f;
  document.querySelectorAll('.filter-chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  renderGrid();
}
function onSort(v){ S.sort=v; renderGrid(); }
function onSearch(v){ S.search=v.toLowerCase(); renderGrid(); }

function applyFilters(ads){
  var list=ads.slice();
  if(S.filter==='video') list=list.filter(function(a){ return a.videoUrl; });
  if(S.filter==='image') list=list.filter(function(a){ return !a.videoUrl && a.imageUrl; });
  if(S.search) list=list.filter(function(a){ return (a.advertiser+a.copy+a.linkTitle).toLowerCase().indexOf(S.search)>=0; });
  if(S.sort==='newest') list.sort(function(a,b){ return new Date(b.addedAt||b.createdAt||0)-new Date(a.addedAt||a.createdAt||0); });
  if(S.sort==='oldest') list.sort(function(a,b){ return new Date(a.addedAt||a.createdAt||0)-new Date(b.addedAt||b.createdAt||0); });
  if(S.sort==='az') list.sort(function(a,b){ return (a.advertiser||'').localeCompare(b.advertiser||''); });
  return list;
}

function openVid(url){
  var p=document.getElementById('vid-player');
  p.src=url; p.play();
  document.getElementById('vid-overlay').classList.add('open');
}
function closeVid(ev){
  if(ev&&ev.target!==document.getElementById('vid-overlay')) return;
  document.getElementById('vid-player').pause();
  document.getElementById('vid-overlay').classList.remove('open');
}

function openAI(ad){
  S.currentAI=ad; S.aiMessages=[];
  document.getElementById('ai-title').textContent=ad.advertiser||'Anuncio';
  var body=document.getElementById('ai-body');
  body.innerHTML='<div class="ai-loading">Analisando anuncio...</div>';
  document.getElementById('ai-overlay').classList.add('open');
  analyzeAd(ad);
}
function closeAI(ev){
  if(ev&&ev.target!==document.getElementById('ai-overlay')) return;
  document.getElementById('ai-overlay').classList.remove('open');
}
async function analyzeAd(ad){
  try{
    var token=localStorage.getItem('hubToken')||'no-auth';
    var r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({ad:ad})});
    var d=await r.json();
    var body=document.getElementById('ai-body');
    if(d.analysis){
      S.aiMessages=[{role:'assistant',content:d.analysis}];
      renderAIMessages();
      if(S.tab==='saved'){
        var t=localStorage.getItem('hubToken')||'no-auth';
        fetch('/api/saved/'+ad.id,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({analysis:d.analysis})});
      }
    } else { body.innerHTML='<p style="color:var(--red)">Erro: '+(d.error||'Falha na analise')+'</p>'; }
  }catch(err){ document.getElementById('ai-body').innerHTML='<p style="color:var(--red)">Erro: '+err.message+'</p>'; }
}
function renderAIMessages(){
  var body=document.getElementById('ai-body');
  body.innerHTML=S.aiMessages.map(function(m){
    return '<div class="ai-msg '+m.role+'">'+e(m.content)+'</div>';
  }).join('');
  body.scrollTop=body.scrollHeight;
}
async function sendAIMsg(){
  var inp=document.getElementById('ai-input');
  var msg=inp.value.trim(); if(!msg) return;
  inp.value='';
  S.aiMessages.push({role:'user',content:msg});
  renderAIMessages();
  try{
    var token=localStorage.getItem('hubToken')||'no-auth';
    var ad=S.currentAI;
    var fullPrompt='Contexto do anuncio:\nAnunciante: '+ad.advertiser+'\nCopy: '+ad.copy+'\n\nPergunta: '+msg;
    var r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({ad:{...ad,copy:fullPrompt}})});
    var d=await r.json();
    if(d.analysis){ S.aiMessages.push({role:'assistant',content:d.analysis}); renderAIMessages(); }
  }catch(err){ S.aiMessages.push({role:'assistant',content:'Erro: '+err.message}); renderAIMessages(); }
}

function openImport(){
  document.getElementById('import-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('import-url').focus(); },100);
}
function closeImport(ev){
  if(ev&&ev.target!==document.getElementById('import-overlay')) return;
  document.getElementById('import-overlay').classList.remove('open');
}
async function submitImport(){
  var urlVal=document.getElementById('import-url').value.trim();
  if(!urlVal){ toast('Cole a URL do Ad Library'); return; }
  var adLibraryId='';
  try{
    var u=new URL(urlVal.indexOf('facebook.com')>=0?urlVal:'https://x.com/?id='+urlVal);
    adLibraryId=u.searchParams.get('id')||urlVal.replace(/\D/g,'').slice(0,20)||urlVal;
  }catch(ex){ adLibraryId=urlVal.replace(/\D/g,'').slice(0,20)||urlVal; }
  var name=document.getElementById('import-name').value.trim()||'Desconhecido';
  var copy=document.getElementById('import-copy').value.trim();
  var today=new Date();
  var ad={
    id:'fb_'+adLibraryId,
    advertiser:name,
    adLibraryId:adLibraryId,
    copy:copy,
    snapshotUrl:'https://www.facebook.com/ads/library/?id='+adLibraryId,
    platforms:['facebook'],
    createdAt:today.toISOString().split('T')[0],
    addedAt:today.toLocaleDateString('pt-BR'),
    source:'manual'
  };
  try{
    var token=localStorage.getItem('hubToken')||'no-auth';
    var r=await fetch('/api/queue',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(ad)});
    if(r.ok){
      S.queueAds.unshift(ad);
      renderGrid();
      closeImport();
      document.getElementById('import-url').value='';
      document.getElementById('import-name').value='';
      document.getElementById('import-copy').value='';
      toast('Anuncio adicionado a fila!');
    }else{ toast('Erro ao adicionar'); }
  }catch(err){ toast('Erro: '+err.message); }
}

function buildCard(ad, isQueue){
  var initials=(ad.advertiser||'?').split(' ').slice(0,2).map(function(w){ return w[0]||''; }).join('').toUpperCase()||'?';
  var avatarInner=initials;
  if(ad.pageLogo){
    avatarInner='<img src="'+e(ad.pageLogo)+'" style="width:100%;height:100%;object-fit:cover" onerror="imgFail(this)" alt="">';
  }
  var mediaHtml='';
  if(ad.videoUrl){
    mediaHtml='<div class="card-media"><video src="'+e(ad.videoUrl)+'" poster="'+e(ad.imageUrl||'')+'" onclick="openVid(\''+e(ad.videoUrl)+'\')" style="cursor:pointer"></video></div>';
  } else if(ad.imageUrl){
    mediaHtml='<div class="card-media"><img src="'+e(ad.imageUrl)+'" alt="" loading="lazy"></div>';
  }
  var copyHtml='';
  if(ad.copy){
    var copyId='copy-'+ad.id;
    copyHtml='<div class="card-copy truncated" id="'+copyId+'">'+e(ad.copy)+'</div><button class="see-more" onclick="toggleCopy(\''+copyId+'\',this)">Ver mais</button>';
  }
  var linkHtml='';
  if(ad.linkTitle||ad.linkDesc){
    var domain='';
    if(ad.snapshotUrl){ try{ domain=new URL(ad.snapshotUrl).hostname.replace('www.',''); }catch(x){} }
    linkHtml='<div class="card-link" onclick="window.open(\''+e(ad.snapshotUrl||'#')+'\',\'_blank\')"><div class="link-left"><div class="link-domain">'+e(domain)+'</div><div class="link-title">'+e(ad.linkTitle||'')+'</div><div class="link-desc">'+e(ad.linkDesc||'')+'</div></div><div class="link-cta">Saiba mais</div></div>';
  }
  var platforms=(ad.platforms||['facebook']).map(function(p){ return '<span class="platform-tag">'+e(p)+'</span>'; }).join('');
  var footBtns='';
  if(isQueue){
    footBtns='<button class="save-btn" onclick="saveAd(\''+ad.id+'\',this)">Salvar</button>';
  } else {
    footBtns='<button class="delete-btn" onclick="deleteAd(\''+ad.id+'\',this)">Remover</button>';
  }
  var adlibBtn='';
  if(ad.snapshotUrl){
    adlibBtn='<a class="adlib-btn" href="'+e(ad.snapshotUrl)+'" target="_blank">Ad Library</a>';
  }
  var aiBtn='<button class="icon-btn" onclick="openAI(getAd(\''+ad.id+'\'))">&#129302;</button>';
  return '<div class="hub-card" id="card-'+ad.id+'">'
    +'<div class="card-head">'
    +'<div class="card-avatar" data-initials="'+initials+'">'+avatarInner+'</div>'
    +'<div class="card-meta"><div class="card-name">'+e(ad.advertiser||'Desconhecido')+'</div><div class="card-sub">'+e(ad.addedAt||ad.createdAt||'')+(ad.source==='manual'?' &middot; manual':'')+'</div></div>'
    +'<div class="card-actions">'+adlibBtn+aiBtn+'</div>'
    +'</div>'
    +mediaHtml
    +copyHtml
    +linkHtml
    +'<div class="card-foot">'+platforms+'<span class="card-date">'+e(ad.addedAt||ad.createdAt||'')+'</span>'+footBtns+'</div>'
    +'</div>';
}

function getAd(id){
  return S.queueAds.find(function(a){ return a.id===id; }) || S.savedAds.find(function(a){ return a.id===id; }) || {id:id};
}

function toggleCopy(id,btn){
  var el=document.getElementById(id);
  if(!el) return;
  if(el.classList.contains('truncated')){
    el.classList.remove('truncated');
    btn.textContent='Ver menos';
  } else {
    el.classList.add('truncated');
    btn.textContent='Ver mais';
  }
}

function renderGrid(){
  var ads=S.tab==='queue'?S.queueAds:S.savedAds;
  var filtered=applyFilters(ads);
  var grid=document.getElementById('ads-grid');
  var badge=document.getElementById('count-badge');
  badge.textContent=filtered.length;
  if(filtered.length===0){
    var msg=S.tab==='queue'?'Nenhum anuncio na fila. Navegue no Facebook com a extensao ativada ou adicione manualmente com o botao +.':'Nenhum anuncio salvo ainda. Salve anuncios da fila para referencia futura.';
    grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="icon">&#128270;</div><h3>Nada por aqui</h3><p>'+msg+'</p></div>';
    return;
  }
  var isQueue=S.tab==='queue';
  grid.innerHTML=filtered.map(function(ad){ return buildCard(ad,isQueue); }).join('');
}

async function saveAd(id,btn){
  var ad=getAd(id);
  btn.disabled=true; btn.textContent='Salvando...';
  try{
    var token=localStorage.getItem('hubToken')||'no-auth';
    var r=await fetch('/api/saved',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(ad)});
    if(r.ok){
      if(!S.savedAds.find(function(a){ return a.id===id; })) S.savedAds.unshift(ad);
      btn.classList.add('saved'); btn.textContent='Salvo';
      toast('Salvo!');
    } else { btn.disabled=false; btn.textContent='Salvar'; toast('Erro ao salvar'); }
  }catch(err){ btn.disabled=false; btn.textContent='Salvar'; toast('Erro: '+err.message); }
}

async function deleteAd(id,btn){
  var endpoint=S.tab==='queue'?'/api/queue/':'/api/saved/';
  try{
    var token=localStorage.getItem('hubToken')||'no-auth';
    await fetch(endpoint+id,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
    if(S.tab==='queue') S.queueAds=S.queueAds.filter(function(a){ return a.id!==id; });
    else S.savedAds=S.savedAds.filter(function(a){ return a.id!==id; });
    renderGrid();
    toast('Removido');
  }catch(err){ toast('Erro: '+err.message); }
}

async function loadAds(){
  try{
    var token=localStorage.getItem('hubToken')||'no-auth';
    var headers={'Authorization':'Bearer '+token};
    var r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:''})});
    var d=await r.json();
    if(d.token){ token=d.token; localStorage.setItem('hubToken',token); }
  }catch(e){}
  try{
    var token2=localStorage.getItem('hubToken')||'no-auth';
    var h={'Authorization':'Bearer '+token2};
    var qr=await fetch('/api/queue',{headers:h});
    S.queueAds=await qr.json();
    var sr=await fetch('/api/saved',{headers:h});
    S.savedAds=await sr.json();
    renderGrid();
  }catch(err){ console.error('Load error:',err); }
}

loadAds();
</script>
</body>
</html>
