<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='d' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='35%25' stop-color='%23d0d0d0'/%3E%3Cstop offset='100%25' stop-color='%23888'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='52' y='134' font-family='Arial Black' font-weight='900' font-size='110' fill='%23000' opacity='.35'%3ED%3C/text%3E%3Ctext x='48' y='130' font-family='Arial Black' font-weight='900' font-size='110' fill='url(%23d)'%3ED%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--sidebar:#12141a;--sidebar-hover:#1e2028;
  --card:#fff;--border:#e4e6eb;--text:#1c1e21;--text2:#65676b;
  --primary:#5865f2;--primary-hover:#4752d8;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --shadow:0 1px 4px rgba(0,0,0,.1);--radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--sidebar);display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:#1e2028;border-radius:16px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:6px}
.login-logo-img{width:88px;height:88px;margin-bottom:8px;filter:drop-shadow(0 4px 18px rgba(88,101,242,.35))}
.login-logo-name{font-size:26px;font-weight:900;color:#fff;letter-spacing:-1px}
.login-logo-name span{color:var(--primary)}
.login-sub{color:#9ca3af;font-size:13px;margin-bottom:28px;text-align:center}
.login-label{display:block;font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.login-input{width:100%;padding:10px 14px;background:#12141a;border:1.5px solid #2d3148;border-radius:8px;color:#fff;font-size:14px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--primary)}
.login-btn{width:100%;margin-top:20px;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.login-btn:hover{background:var(--primary-hover)}
.login-err{color:#f87171;font-size:13px;margin-top:10px;text-align:center;min-height:18px}

/* APP SHELL */
#app{display:none;flex:1;overflow:hidden;flex-direction:row}
#app.visible{display:flex}

/* SIDEBAR */
.sidebar{width:210px;min-width:210px;background:var(--sidebar);display:flex;flex-direction:column;padding:16px 10px;overflow-y:auto}
.sidebar-logo{display:flex;align-items:center;justify-content:center;padding:14px 10px 20px}
.sidebar-logo-img{width:72px;height:72px;flex-shrink:0}
.s-section{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#4b5563;padding:4px 10px;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:#9ca3af;font-size:13px;font-weight:500;margin-bottom:2px;transition:all .15s}
.nav-item:hover{background:var(--sidebar-hover);color:#fff}
.nav-item.active{background:var(--primary);color:#fff}
.nav-icon{font-size:15px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:rgba(255,255,255,.15);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;min-width:22px;text-align:center}
.nav-item.active .nav-badge{background:rgba(255,255,255,.25)}
.s-divider{height:1px;background:#1e2028;margin:10px 0}
.s-action{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;color:#6b7280;font-size:12px;font-weight:500;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:all .15s}
.s-action:hover{background:var(--sidebar-hover);color:#9ca3af}
.sidebar-bottom{margin-top:auto;padding-top:12px}
.sync-info{font-size:11px;color:#4b5563;padding:6px 10px;display:flex;align-items:center;gap:6px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4b5563;flex-shrink:0}
.sync-dot.ok{background:#22c55e}
.sync-dot.spin{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.search-wrap{flex:1;max-width:420px;position:relative}
.search-input{width:100%;padding:8px 12px 8px 34px;background:#f0f2f5;border:1.5px solid transparent;border-radius:20px;font-size:13px;outline:none;transition:all .2s;color:var(--text)}
.search-input:focus{background:#fff;border-color:var(--primary)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:13px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.filter-sel{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);background:#fff;cursor:pointer;outline:none;max-width:160px}
.per-page-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.per-page-sel{border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;color:var(--text);background:#fff;cursor:pointer;outline:none}
.page-info{font-size:12px;color:var(--text2);white-space:nowrap}
.pagination{display:flex;align-items:center;gap:4px}
.page-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.page-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.page-btn:disabled{opacity:.35;cursor:not-allowed}

/* GRID - 3 colunas */
.grid-wrap{flex:1;overflow-y:auto;padding:20px 28px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;align-items:start}

/* EMPTY */
.empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text2);gap:10px}
.empty-icon{font-size:50px;opacity:.3}
.empty-title{font-size:16px;font-weight:600;color:var(--text)}
.empty-desc{font-size:13px;text-align:center;max-width:300px;line-height:1.5}

/* HUB CARD - Facebook style */
.hub-card{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--border);transition:box-shadow .2s}
.hub-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.14)}

/* Card header */
.card-head{display:flex;align-items:flex-start;gap:10px;padding:12px 12px 8px}
.card-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0;letter-spacing:-.5px;position:relative;overflow:hidden}
.card-meta{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:700;color:var(--text);word-break:break-word;line-height:1.35;margin-bottom:2px}
.card-sub{font-size:11px;color:var(--text2)}
.card-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;margin-top:-2px}
.adlib-btn{font-size:11px;font-weight:700;padding:5px 10px;border:none;border-radius:6px;background:#e7f3ff;color:#1877f2;cursor:pointer;text-decoration:none;white-space:nowrap;transition:all .15s}
.adlib-btn:hover{background:#cce4ff}
.hdr-icon{width:32px;height:32px;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;background:none;color:var(--text2)}
.hdr-icon:hover{background:#f0f2f5}
.hdr-icon.save:hover{color:var(--amber)}
.hdr-icon.analyze:hover{color:var(--primary);background:#ede9fe}
.hdr-icon.del:hover{color:var(--red);background:#fee2e2}

/* Copy */
.card-copy{padding:4px 12px 10px;font-size:14px;line-height:1.55;color:#1c1e21;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.card-copy.open{display:block;-webkit-line-clamp:unset}
.copy-more{padding:0 12px 8px;font-size:12.5px;color:#65676b;cursor:pointer;background:none;border:none;text-align:left;display:block;font-weight:600}
.copy-more:hover{color:var(--primary)}

/* Media - sem limite de altura, aspect ratio natural */
.card-media{background:#f0f2f5;overflow:hidden;line-height:0}
.card-media img{width:100%;height:auto;display:block;max-height:480px;object-fit:contain}
.card-media video{width:100%;display:block;max-height:480px;background:#000}

/* Link card - Facebook style */
.card-link{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;background:#f0f2f5;border-top:1px solid #e4e6eb}
.link-left{flex:1;min-width:0}
.link-domain{font-size:10.5px;color:#65676b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.link-title{font-size:13.5px;font-weight:700;color:var(--text);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.link-desc{font-size:12px;color:#65676b;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:2px}
.cta-btn{flex-shrink:0;padding:8px 16px;background:#1877f2;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;transition:all .15s}
.cta-btn:hover{background:#166fe5}

/* Analysis */
.card-analysis{margin:0 12px 12px;background:#f0f4ff;border-radius:8px;padding:12px;font-size:12.5px;line-height:1.75;color:#374151;border-left:3px solid var(--primary);white-space:pre-wrap}
.analyzing-msg{display:flex;align-items:center;gap:8px;padding:10px 12px;font-size:13px;color:var(--text2)}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700}
.modal-x{width:28px;height:28px;border:none;background:none;cursor:pointer;font-size:18px;color:var(--text2);border-radius:6px;display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:#f0f2f5}
.modal-body{padding:20px}
.m-label{display:block;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:14px}
.m-label:first-child{margin-top:0}
.m-input,.m-ta{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;color:var(--text);font-family:inherit;resize:vertical;transition:border-color .2s}
.m-input:focus,.m-ta:focus{border-color:var(--primary)}
.m-ta{min-height:100px}
.modal-foot{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--border);justify-content:flex-end}
.m-btn{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.m-btn.cancel{background:#f0f2f5;color:var(--text2)}
.m-btn.cancel:hover{background:#e4e6eb}
.m-btn.ok{background:var(--primary);color:#fff}
.m-btn.ok:hover{background:var(--primary-hover)}
.m-msg{font-size:12px;margin-top:6px;min-height:18px}
.analysis-text{font-size:13px;line-height:1.75;color:#374151;white-space:pre-wrap}

/* ─── RESPONSIVO ──────────────────────────────────────────────── */
/* 3 colunas — telas médias (~1300px) */
@media (max-width: 1300px) {
  .grid { grid-template-columns: repeat(3,1fr); }
}
/* 2 colunas — notebooks pequenos (~1024px) */
@media (max-width: 1024px) {
  .grid { grid-template-columns: repeat(2,1fr); }
  .sidebar { width: 180px; min-width: 180px; }
  .grid-wrap { padding: 16px 18px; }
  .topbar { padding: 8px 14px; gap: 8px; }
  .search-wrap { max-width: 280px; }
  .page-info { display: none; }
}
/* 1 coluna — telas muito pequenas ou mobile (<700px) */
@media (max-width: 700px) {
  .grid { grid-template-columns: 1fr; }
  .sidebar { width: 48px; min-width: 48px; padding: 12px 4px; }
  .s-section, .nav-item span, .s-action span, .sync-info { display: none; }
  .sidebar-logo { padding: 4px 4px 14px; }
  .nav-item { justify-content: center; padding: 9px; }
  .nav-badge { display: none; }
  .s-action { justify-content: center; padding: 8px; }
  .topbar { flex-wrap: wrap; gap: 6px; }
  .search-wrap { max-width: 100%; flex: 1 1 100%; order: -1; }
  .topbar-right { width: 100%; justify-content: flex-end; }
  .grid-wrap { padding: 12px; }
}

/* ─── DOMÍNIOS VIEW ──────────────────────────────────────────── */
.domains-view{flex:1;overflow-y:auto;padding:20px 24px;display:none;flex-direction:column;gap:16px}
.domains-view.visible{display:flex}
.d-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.d-stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.d-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);font-weight:700;margin-bottom:8px}
.d-stat-num{font-size:26px;font-weight:800;color:var(--text);line-height:1.1;word-break:break-all}
.d-stat-sub{font-size:11px;color:var(--text2);margin-top:4px}
.d-body{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
.d-table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.d-table-head{padding:12px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--text);display:flex;justify-content:space-between}
.d-table-head span{font-weight:400;color:var(--text2)}
.d-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #f0f2f5;cursor:pointer;transition:background .12s}
.d-row:last-child{border-bottom:none}
.d-row:hover{background:#f7f8fa}
.d-row.sel{background:#eef0ff}
.d-rank{font-size:11px;font-weight:700;color:var(--text2);width:16px;flex-shrink:0}
.d-favicon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:800;flex-shrink:0}
.d-info{flex:1;min-width:0}
.d-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-spark{display:flex;align-items:flex-end;gap:2px;height:18px;margin-top:3px}
.d-spark-bar{width:5px;border-radius:1px 1px 0 0;min-height:2px}
.d-count{text-align:right;flex-shrink:0}
.d-count-num{font-size:17px;font-weight:800;color:var(--primary);line-height:1}
.d-count-lbl{font-size:10px;color:var(--text2)}
.d-trend{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-top:2px}
.d-trend.up{background:#dcfce7;color:#16a34a}
.d-trend.down{background:#fee2e2;color:#dc2626}
.d-trend.flat{background:#f0f2f5;color:var(--text2)}
.d-right{display:flex;flex-direction:column;gap:14px}
.d-chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.d-chart-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.d-chart-title{font-size:14px;font-weight:700;color:var(--text)}
.d-chart-sub{font-size:11px;color:var(--text2);margin-top:1px}
.d-chart-stats{display:flex;gap:16px}
.d-stat-box{text-align:right}
.d-stat-box-num{font-size:20px;font-weight:800;color:var(--text);line-height:1}
.d-stat-box-num.green{color:var(--green)}
.d-stat-box-lbl{font-size:10px;color:var(--text2)}
.d-chart-tabs{display:flex;gap:4px;padding:8px 16px 0}
.d-ctab{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text2)}
.d-ctab.active{background:var(--primary);color:#fff}
.d-chart-body{padding:12px 16px 16px}
.d-ads-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.d-ads-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:10px}
/* dark */
body.dark .d-stat-card{background:var(--card);border-color:var(--border)}
body.dark .d-table-card,.dark .d-chart-card{background:var(--card);border-color:var(--border)}
body.dark .d-row:hover{background:#2d2e30}
body.dark .d-row.sel{background:#1e2040}
body.dark .d-table-head{border-color:var(--border)}
body.dark .d-row{border-color:#3a3b3c}
body.dark .d-chart-head{border-color:var(--border)}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:#1c1e21;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}

/* DARK MODE */
body.dark{--bg:#18191a;--card:#242526;--border:#3a3b3c;--text:#e4e6eb;--text2:#b0b3b8;--shadow:0 1px 4px rgba(0,0,0,.4)}
body.dark .topbar{background:#242526;border-bottom-color:#3a3b3c}
body.dark .search-input{background:#3a3b3c;color:#e4e6eb}
body.dark .search-input::placeholder{color:#6b7280}
body.dark .search-input:focus{background:#4a4b4c;border-color:var(--primary)}
body.dark .per-page-sel{background:#3a3b3c;color:#e4e6eb;border-color:#4a4b4c}
body.dark .filter-sel{background:#3a3b3c;color:#e4e6eb;border-color:#4a4b4c}
body.dark .page-btn{background:#3a3b3c;color:#b0b3b8;border-color:#4a4b4c}
body.dark .page-btn:hover:not(:disabled){background:#4a4b4c;border-color:var(--primary);color:var(--primary)}
body.dark .hub-card{box-shadow:0 2px 8px rgba(0,0,0,.4)}
body.dark .hub-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.6)}
body.dark .card-copy{color:#e4e6eb}
body.dark .card-link{background:#3a3b3c;border-top-color:#4a4b4c}
body.dark .link-domain{color:#b0b3b8}
body.dark .link-title{color:#e4e6eb}
body.dark .link-desc{color:#9ca3af}
body.dark .cta-btn{background:#1877f2;color:#fff}
body.dark .cta-btn:hover{background:#166fe5}
body.dark .adlib-btn{background:#1d3557;color:#7eb8f7}
body.dark .adlib-btn:hover{background:#254773}
body.dark .hdr-icon:hover{background:#3a3b3c}
body.dark .hdr-icon.save:hover{color:var(--amber);background:#2d2a1a}
body.dark .hdr-icon.analyze:hover{color:var(--primary);background:#1e1a3d}
body.dark .hdr-icon.del:hover{color:var(--red);background:#2d1a1a}
body.dark .copy-more{color:#b0b3b8}
body.dark .copy-more:hover{color:var(--primary)}
body.dark .card-analysis{background:#1a2233;color:#b0b3b8;border-left-color:var(--primary)}
body.dark .analyzing-msg{color:#b0b3b8}
body.dark .modal{background:#242526}
body.dark .modal-head{border-bottom-color:#3a3b3c}
body.dark .modal-foot{border-top-color:#3a3b3c}
body.dark .modal-title{color:#e4e6eb}
body.dark .m-label{color:#b0b3b8}
body.dark .m-input,.dark .m-ta{background:#3a3b3c;color:#e4e6eb;border-color:#4a4b4c}
body.dark .m-input:focus,body.dark .m-ta:focus{border-color:var(--primary)}
body.dark .m-btn.cancel{background:#3a3b3c;color:#b0b3b8}
body.dark .m-btn.cancel:hover{background:#4a4b4c}
body.dark .modal-x{color:#b0b3b8}
body.dark .modal-x:hover{background:#3a3b3c}
body.dark .analysis-text{color:#e4e6eb}
body.dark #confirm-msg{color:#b0b3b8}
body.dark .empty-state{color:#b0b3b8}
body.dark .empty-title{color:#e4e6eb}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="display:none">
  <div class="login-box">

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── ESTADO ──────────────────────────────────────────────────────────────────
const S = {
  token: localStorage.getItem('hub_token') || '',
  queue: [], saved: [],
  tab: 'queue', page: 1, perPage: 16, search: '',
  analyzing: new Set(),
};

const API = async (method, path, body) => {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${S.token}` } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
};

// ── AUTH ────────────────────────────────────────────────────────────────────
async function checkAuth() {
  try {
    const r = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password:''}) });
    if (r.ok) { const { token } = await r.json(); S.token = token; localStorage.setItem('hub_token', token); showApp(); return; }
  } catch {}
  if (S.token) {
    try { await API('GET','/api/health'); showApp(); return; } catch {}
  }
  showLogin();
}

async function doLogin() {
  const pwd = document.getElementById('login-pwd').value;
  document.getElementById('login-err').textContent = '';
  try {
    const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd}) });
    if (!r.ok) { document.getElementById('login-err').textContent = 'Senha incorreta'; return; }
    const { token } = await r.json();
    S.token = token; localStorage.setItem('hub_token', token); showApp();
  } catch { document.getElementById('login-err').textContent = 'Erro de conexão'; }
}

function showLogin() { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('app').classList.remove('visible'); }
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  loadData();
  checkDisk();
  setInterval(loadData, 30000);
  setInterval(checkDisk, 60000);
}

async function cleanupMedia() {
  showConfirm(
    '🧹 Liberar espaço em disco',
    'Isso vai apagar todos os arquivos de imagem e vídeo em cache (as imagens nos cards vão recarregar do Facebook). A fila e os salvos NÃO serão apagados. Continuar?',
    async () => {
      try {
        toast('⏳ Limpando...', 60000);
        const r = await fetch('/api/cleanup?mode=media', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${S.token}` }
        });
        const data = await r.json();
        await checkDisk();
        toast(`✅ ${data.filesDeleted} arquivo(s) removido(s). Disco liberado!`);
        await loadData();
      } catch { toast('❌ Erro na limpeza'); }
    }
  );
}

async function checkDisk() {
  try {
    const r = await fetch('/api/health', { headers: { 'Authorization': `Bearer ${S.token}` } });
    const data = await r.json();
    if (data.disk) {
      const mb = parseFloat(data.disk.totalMB);
      const MAX_MB = 480; // Railway free tier ~500MB
      const pct = Math.min(100, (mb / MAX_MB) * 100).toFixed(1);
      const color = mb > 380 ? '#ef4444' : mb > 220 ? '#f59e0b' : '#22c55e';
      const el = document.getElementById('disk-info');
      const txt = document.getElementById('disk-txt');
      const bar = document.getElementById('disk-bar');
      txt.textContent = `${data.disk.totalMB} MB / 480 MB`;
      txt.style.color = color;
      bar.style.width = pct + '%';
      bar.style.background = color;
      el.style.display = 'flex';
      if (mb > 420) toast(`🔴 Disco quase cheio: ${data.disk.totalMB} MB — clique em Limpar!`, 6000);
      else if (mb > 220) toast(`🟡 Disco passando da metade: ${data.disk.totalMB} MB`, 4000);
    }
  } catch {}
}

// ── DADOS ────────────────────────────────────────────────────────────────────
async function loadData() {
  setSyncStatus('loading');
  try {
    const [q, sv] = await Promise.all([API('GET','/api/queue'), API('GET','/api/saved')]);
    S.queue = q; S.saved = sv;
    updateBadges();
    if (S.tab === 'domains') renderDomains();
    else renderGrid();
    setSyncStatus('ok');
  } catch { setSyncStatus('error'); }
}

function updateBadges() {
  document.getElementById('badge-queue').textContent = S.queue.length;
  document.getElementById('badge-saved').textContent = S.saved.length;
  const domainCount = Object.keys(getDomainMap()).length;
  document.getElementById('badge-domains').textContent = domainCount || '';
}

function setSyncStatus(st) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-txt');
  if (st === 'loading') { dot.className = 'sync-dot spin'; txt.textContent = 'Sincronizando...'; }
  else if (st === 'ok') { dot.className = 'sync-dot ok'; txt.textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
  else { dot.className = 'sync-dot'; txt.textContent = 'Erro de sync'; }
}

// ── TABS / BUSCA / PAGINAÇÃO ─────────────────────────────────────────────────
function switchTab(tab) {
  S.tab = tab; S.page = 1;
  document.getElementById('nav-queue').className = 'nav-item' + (tab==='queue'?' active':'');
  document.getElementById('nav-saved').className = 'nav-item' + (tab==='saved'?' active':'');
  document.getElementById('nav-domains').className = 'nav-item' + (tab==='domains'?' active':'');
  const isDomains = tab === 'domains';
  document.getElementById('grid-wrap').style.display = isDomains ? 'none' : '';
  document.getElementById('view-domains').classList.toggle('visible', isDomains);
  // Esconde search/paginação na view domains
  document.querySelector('.search-wrap').style.visibility = isDomains ? 'hidden' : '';
  document.querySelector('.topbar-right').style.visibility = isDomains ? 'hidden' : '';
  if (isDomains) renderDomains();
  else renderGrid();
}

function onSearch(v) { S.search = v.toLowerCase(); S.page = 1; renderGrid(); }
function changePerPage(v) { S.perPage = parseInt(v); S.page = 1; renderGrid(); }
function prevPage() { if (S.page > 1) { S.page--; renderGrid(); document.querySelector('.grid-wrap').scrollTop = 0; } }
function nextPage() {
  if (S.page < Math.ceil(getFiltered().length / S.perPage)) { S.page++; renderGrid(); document.querySelector('.grid-wrap').scrollTop = 0; }
}

function getFiltered() {
  let list = S.tab === 'queue' ? S.queue : S.saved;
  if (!S.search) return list;
  return list.filter(a =>
    (a.advertiser||'').toLowerCase().includes(S.search) ||
    (a.copy||'').toLowerCase().includes(S.search) ||
    (a.linkTitle||'').toLowerCase().includes(S.search)
  );
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderGrid() {
  const filtered = getFiltered();
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / S.perPage));
  if (S.page > pages) S.page = pages;
  const start = (S.page-1) * S.perPage;
  const items = filtered.slice(start, start + S.perPage);

  const info = document.getElementById('page-info');
  info.textContent = total === 0 ? '0 ads' : `${start+1}–${Math.min(start+S.perPage,total)} de ${total}`;
  document.getElementById('btn-prev').disabled = S.page <= 1;
  document.getElementById('btn-next').disabled = S.page >= pages;

  const grid = document.getElementById('grid');
  if (items.length === 0) {
    const isQ = S.tab === 'queue';
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${isQ?'📭':'⭐'}</div>
      <div class="empty-title">${isQ?'Fila vazia':'Nenhum ad salvo'}</div>
      <div class="empty-desc">${isQ
        ? 'Configure a extensão Chrome e navegue pelo Facebook para capturar anúncios automaticamente.'
        : 'Salve ads da fila para analisar com IA e acompanhar os melhores.'}</div>
    </div>`;
    return;
  }
  grid.innerHTML = items.map(ad => buildCard(ad)).join('');
}

function buildCard(ad, fromQueue) {
  const isQ = fromQueue !== undefined ? fromQueue : S.tab === 'queue';
  const id = ad.id || '';
  const copy = ad.copy || '';
  const isLong = copy.length > 180;
  const name = ad.advertiser || 'Desconhecido';
  const initials = name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';

  // Media — usa localImageUrl (cache local) ou imageUrl (URL original do Facebook) como fallback
  const thumbSrc = ad.localImageUrl || (ad.imageUrl?.startsWith('http') ? ad.imageUrl : '');
  let media = '';
  if (ad.videoUrl) {
    media = `<div class="card-media"><video src="${e(ad.videoUrl)}"${thumbSrc ? ` poster="${e(thumbSrc)}"` : ''} controls preload="metadata"></video></div>`;
  } else if (thumbSrc) {
    media = `<div class="card-media"><img src="${e(thumbSrc)}" loading="lazy" onerror="this.parentElement.style.display='none'" alt=""></div>`;
  }

  // Link card — mostra quando há linkTitle, linkDesc, URL externa OU ctaText
  let link = '';
  const isExternalUrl = ad.snapshotUrl && !ad.snapshotUrl.includes('facebook.com');
  const hasCta = ad.linkTitle || ad.linkDesc || ad.ctaUrl || ad.vslUrl || isExternalUrl || (ad.ctaText && ad.snapshotUrl);
  if (hasCta) {
    // vslUrl = URL resolvida pelo servidor; decodeFbRedirect extrai da query string;
    // ctaUrl direto como fallback (inclui l.facebook.com/l.php → redireciona pro destino)
    const bestUrl = ad.vslUrl || decodeFbRedirect(ad.ctaUrl) || (ad.ctaUrl?.startsWith('http') ? ad.ctaUrl : '') || ad.snapshotUrl || '';
    // Domínio: usa campo nativo do Facebook, ou extrai da URL real (nunca exibe facebook.com)
    let domain = ad.linkDomain || '';
    if (!domain) {
      try {
        const h = new URL(bestUrl || 'http://x').hostname.replace('www.', '');
        if (!h.includes('facebook.com') && h !== 'x') domain = h;
      } catch {}
    }
    const ctaLabel = ad.ctaText || 'Saiba mais';
    link = `<div class="card-link">
      <div class="link-left">
        ${domain?`<div class="link-domain">${e(domain)}</div>`:''}
        ${ad.linkTitle?`<div class="link-title">${e(ad.linkTitle)}</div>`:''}
        ${ad.linkDesc?`<div class="link-desc">${e(ad.linkDesc)}</div>`:''}
      </div>
      ${ctaLabel?(()=>{const href=bestUrl;return href?`<a href="${e(href)}" target="_blank" class="cta-btn">${e(ctaLabel)}</a>`:''})():''}
    </div>`;
  }

  // Analysis
  let analysis = '';
  if (S.analyzing.has(id)) {
    analysis = `<div class="analyzing-msg">⏳ Analisando com IA...</div>`;
  } else if (!isQ && ad.analysis) {
    analysis = `<div class="card-analysis">${e(ad.analysis)}</div>`;
  }

  // AD LIBRARY button — abre o anúncio específico na biblioteca (sempre country=ALL)
  const _rawAdlibUrl = (ad.snapshotUrl && ad.snapshotUrl.includes('facebook.com'))
    ? ad.snapshotUrl
    : (ad.adLibraryId ? `https://www.facebook.com/ads/library/?id=${ad.adLibraryId}&country=ALL`
      : (ad.advertiser ? `https://www.facebook.com/ads/library/?active_status=all&ad_type=all&country=ALL&q=${encodeURIComponent(ad.advertiser)}&search_type=page` : ''));
  // Se já tem country=XX → substitui; se não tem → adiciona
  const adlibUrl = _rawAdlibUrl
    ? (/country=/i.test(_rawAdlibUrl)
      ? _rawAdlibUrl.replace(/country=[A-Za-z]{2,3}/gi, 'country=ALL')
      : _rawAdlibUrl + (_rawAdlibUrl.includes('?') ? '&' : '?') + 'country=ALL')
    : '';
  const adlibBtn = adlibUrl ? `<a href="${e(adlibUrl)}" target="_blank" class="adlib-btn">AD LIBRARY</a>` : '';

  // Action icons in header
  let actionIcons = '';
  if (isQ) {
    actionIcons = `
      <button class="hdr-icon save" title="Salvar" onclick="saveAd('${id}')">⭐</button>
      <button class="hdr-icon del" title="Ignorar" onclick="deleteQueue('${id}')">🗑️</button>`;
  } else {
    actionIcons = `
      ${ad.analysis
        ? `<button class="hdr-icon analyze" title="Ver Análise" onclick="showAnalysis('${id}')">📋</button>`
        : `<button class="hdr-icon analyze" title="Analisar com IA" onclick="analyzeSaved('${id}')">🤖</button>`}
      <button class="hdr-icon del" title="Remover" onclick="deleteSaved('${id}')">🗑️</button>`;
  }

  return `<div class="hub-card" id="card-${id}">
    <div class="card-head">
      <div class="card-avatar">${initials}${(ad.localPageLogo || ad.pageLogo) ? `<img src="${e(ad.localPageLogo || ad.pageLogo)}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.remove()" alt="">` : ''}</div>
      <div class="card-meta">
        <div class="card-name" title="${e(name)}">${e(name)}</div>
        <div class="card-sub">🌐 Patrocinado · ${e(ad.addedAt||ad.createdAt||'')}</div>
      </div>
      <div class="card-actions">
        ${adlibBtn}
        ${actionIcons}
      </div>
    </div>
    ${copy?`<div class="card-copy" id="copy-${id}">${e(copy)}</div>${isLong?`<button class="copy-more" onclick="toggleCopy('${id}')">Ver mais ▾</button>`:''}` : ''}
    ${media}
    ${link}
    ${analysis}
  </div>`;
}

// Extrai URL destino de l.facebook.com/l.php?u=URL sem passar pelo redirect do Facebook
function decodeFbRedirect(url) {
  if (!url) return url;
  try {
    if (!url.includes('l.facebook.com') && !url.includes('/l.php')) return url;
    const u = new URL(url);
    if (u.pathname.includes('/l.php')) {
      const dest = u.searchParams.get('u');
      if (dest && dest.startsWith('http') && !dest.includes('facebook.com')) return dest;
    }
  } catch(e) {}
  return url;
}

function e(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toggleCopy(id) {
  const el = document.getElementById('copy-'+id);
  const btn = el.nextElementSibling;
  if (!btn || !btn.classList.contains('copy-more')) return;
  const open = el.classList.toggle('open');
  btn.textContent = open ? 'Ver menos ▴' : 'Ver mais ▾';
}

// ── AÇÕES ────────────────────────────────────────────────────────────────────
async function saveAd(id) {
  const ad = S.queue.find(a=>a.id===id); if (!ad) return;
  try {
    await API('POST','/api/saved',ad);
    await API('DELETE',`/api/queue/${id}`);
    S.queue = S.queue.filter(a=>a.id!==id);
    S.saved.unshift(ad);
    updateBadges(); renderGrid(); toast('✅ Ad salvo!');
  } catch { toast('❌ Erro ao salvar'); }
}

async function analyzeAndSave(id) {
  const ad = S.queue.find(a=>a.id===id); if (!ad) return;
  try {
    await API('POST','/api/saved',ad);
    await API('DELETE',`/api/queue/${id}`);
    S.queue = S.queue.filter(a=>a.id!==id);
    S.saved.unshift({...ad});
    updateBadges(); renderGrid(); toast('✅ Salvo! Analisando...');
    await analyzeSaved(id);
  } catch { toast('❌ Erro ao salvar'); }
}

async function analyzeSaved(id) {
  const ad = S.saved.find(a=>a.id===id); if (!ad) return;
  S.analyzing.add(id); renderGrid();
  try {
    const { analysis } = await API('POST','/api/analyze',{ad});
    await API('PATCH',`/api/saved/${id}`,{analysis});
    const idx = S.saved.findIndex(a=>a.id===id);
    if (idx !== -1) S.saved[idx].analysis = analysis;
    S.analyzing.delete(id); renderGrid(); toast('✅ Análise concluída!');
  } catch (err) {
    S.analyzing.delete(id); renderGrid();
    toast('❌ ' + (err.message.includes('500') ? 'Configure a chave da API Claude' : 'Erro na análise'));
  }
}

function showAnalysis(id) {
  const ad = S.saved.find(a=>a.id===id);
  if (!ad?.analysis) return;
  document.getElementById('analysis-content').textContent = ad.analysis;
  document.getElementById('modal-analysis').style.display = 'flex';
}

async function deleteQueue(id) {
  try {
    await API('DELETE',`/api/queue/${id}`);
    S.queue = S.queue.filter(a=>a.id!==id);
    updateBadges(); renderGrid(); toast('🗑️ Removido da fila');
  } catch(err) { toast('❌ Erro ao excluir — disco cheio? Tente limpar a fila.'); checkDisk(); }
}

async function deleteSaved(id) {
  try {
    await API('DELETE',`/api/saved/${id}`);
    S.saved = S.saved.filter(a=>a.id!==id);
    updateBadges(); renderGrid(); toast('🗑️ Removido dos salvos');
  } catch(err) { toast('❌ Erro ao excluir — disco cheio? Tente limpar a fila.'); checkDisk(); }
}

function confirmClearQueue() {
  if (!S.queue.length) { toast('Fila já está vazia'); return; }
  showConfirm('Limpar Fila',
    `Remover todos os ${S.queue.length} ads da fila? Esta ação não pode ser desfeita.`,
    async () => { await API('DELETE','/api/queue'); S.queue=[]; updateBadges(); renderGrid(); toast('🗑️ Fila limpa'); }
  );
}

function showConfirm(title, msg, onOk) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-ok').onclick = () => { closeModal('modal-confirm'); onOk(); };
  document.getElementById('modal-confirm').style.display = 'flex';
}

// ── EXPORTAR ─────────────────────────────────────────────────────────────────
function exportSaved() {
  if (!S.saved.length) { toast('Nenhum ad salvo para exportar'); return; }
  download('offer-hub-salvos.json', JSON.stringify(S.saved, null, 2));
  toast(`📤 ${S.saved.length} ads exportados`);
}
function exportAll() {
  download('offer-hub-completo.json', JSON.stringify({queue:S.queue,saved:S.saved},null,2));
  toast(`📤 Exportado: ${S.queue.length} na fila + ${S.saved.length} salvos`);
}
function download(name, content) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type:'application/json'}));
  a.download = name; a.click(); URL.revokeObjectURL(a.href);
}

// ── IMPORTAR ──────────────────────────────────────────────
function openImport() { document.getElementById('modal-import').style.display='flex'; }
async function doImport() {
  const raw = document.getElementById('import-json').value.trim();
  const msg = document.getElementById('import-msg');
  try {
    const ads = JSON.parse(raw);
    if (!Array.isArray(ads)) throw new Error('JSON deve ser um array');
    await API('POST','/api/queue',ads);
    msg.style.color='#22c55e'; msg.textContent=`✅ ${ads.length} ad(s) importado(s)!`;
    await loadData();
    setTimeout(()=>closeModal('modal-import'),1200);
  } catch(err) { msg.style.color='#ef4444'; msg.textContent='❌ '+err.message; }
}

// ── MODAIS ───────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).style.display='none'; }
document.querySelectorAll('.modal-bg').forEach(el=>{
  el.addEventListener('click', e => { if(e.target===el) closeModal(el.id); });
});

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, dur = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── DARK MODE ─────────────────────────────────────────────────────────────────
function toggleDark() {
  document.body.classList.toggle('dark');
  localStorage.setItem('hub_dark', document.body.classList.contains('dark') ? '1' : '');
  updateDarkBtn();
}
function updateDarkBtn() {
  const isDark = document.body.classList.contains('dark');
  document.getElementById('dark-toggle').innerHTML = `<span>${isDark ? '☀️' : '🌙'}</span> Modo ${isDark ? 'Claro' : 'Escuro'}`;
}
if (localStorage.getItem('hub_dark')) document.body.classList.add('dark');

// ── DOMÍNIOS ─────────────────────────────────────────────────────────────────
let domainChart = null;
let selectedDomain = null;
let chartDays = 7;

function getAdDay(ad) {
  if (ad.createdAt && /^\d{4}-\d{2}-\d{2}/.test(ad.createdAt)) return ad.createdAt.substring(0, 10);
  if (ad.addedAt) {
    const parts = ad.addedAt.split('/');
    if (parts.length === 3) return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
  }
  return new Date().toISOString().split('T')[0];
}

function getLastNDays(n) {
  const days = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}

function getDomainMap() {
  const map = {};
  [...S.queue, ...S.saved].forEach(ad => {
    let domain = ad.linkDomain || '';
    if (!domain) {
      try {
        const bestUrl = ad.vslUrl || decodeFbRedirect(ad.ctaUrl) || (ad.ctaUrl?.startsWith('http') ? ad.ctaUrl : '');
        if (bestUrl) {
          const h = new URL(bestUrl).hostname.replace('www.', '');
          if (!h.includes('facebook.com') && h.length > 3) domain = h;
        }
      } catch {}
    }
    if (!domain) return;
    if (!map[domain]) map[domain] = { domain, ads: [], byDay: {} };
    // Evita duplicatas (mesmo ad em queue e saved)
    if (!map[domain].ads.find(a => a.id === ad.id)) map[domain].ads.push(ad);
    const day = getAdDay(ad);
    map[domain].byDay[day] = (map[domain].byDay[day] || 0) + 1;
  });
  return map;
}

function getDomainColor(domain) {
  let hash = 0;
  for (let i = 0; i < domain.length; i++) hash = domain.charCodeAt(i) + ((hash << 5) - hash);
  const palette = ['#5865f2','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899','#10b981','#3b82f6'];
  return palette[Math.abs(hash) % palette.length];
}

function renderDomains() {
  const map = getDomainMap();
  const data = Object.values(map).sort((a, b) => b.ads.length - a.ads.length);
  if (!data.length) {
    document.getElementById('domain-summary').innerHTML = `<div class="d-stat-card" style="grid-column:1/-1;text-align:center;padding:40px">
      <div style="font-size:36px;opacity:.3;margin-bottom:12px">🌐</div>
      <div style="font-size:15px;font-weight:700;color:var(--text)">Nenhum domínio capturado ainda</div>
      <div style="font-size:13px;color:var(--text2);margin-top:6px">Navegue pelo Facebook com a extensão ativa para capturar ads.</div>
    </div>`;
    document.getElementById('domain-table').innerHTML = '';
    return;
  }
  if (!selectedDomain || !map[selectedDomain]) selectedDomain = data[0].domain;
  renderDomainSummary(data);
  renderDomainTable(data, map);
  renderDomainDetail(map[selectedDomain]);
}

function renderDomainSummary(data) {
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  let maxRecent = 0, topGrowth = data[0];
  data.forEach(d => {
    const recent = (d.byDay[today] || 0) + (d.byDay[yesterday] || 0);
    if (recent > maxRecent) { maxRecent = recent; topGrowth = d; }
  });
  document.getElementById('domain-summary').innerHTML = `
    <div class="d-stat-card">
      <div class="d-stat-label">Domínios únicos</div>
      <div class="d-stat-num">${data.length}</div>
      <div class="d-stat-sub">em fila + salvos</div>
    </div>
    <div class="d-stat-card" style="cursor:pointer" onclick="selectDomain('${e(data[0].domain)}')">
      <div class="d-stat-label">Maior volume</div>
      <div class="d-stat-num" style="font-size:16px;color:var(--primary)">${e(data[0].domain)}</div>
      <div class="d-stat-sub">${data[0].ads.length} ads capturados</div>
    </div>
    <div class="d-stat-card" style="cursor:pointer" onclick="selectDomain('${e(topGrowth.domain)}')">
      <div class="d-stat-label">Escalando mais</div>
      <div class="d-stat-num" style="font-size:16px;color:var(--green)">${e(topGrowth.domain)}</div>
      <div class="d-stat-sub">+${maxRecent} ads hoje/ontem</div>
    </div>
  `;
}

function renderDomainTable(data, map) {
  const days7 = getLastNDays(7);
  const today = days7[6];
  const yesterday = days7[5];
  const rows = data.map((d, i) => {
    const color = getDomainColor(d.domain);
    const letter = d.domain[0].toUpperCase();
    const maxDay = Math.max(...days7.map(day => d.byDay[day] || 0), 1);
    const sparkBars = days7.map(day => {
      const cnt = d.byDay[day] || 0;
      const h = Math.max(2, Math.round((cnt / maxDay) * 16));
      return `<div class="d-spark-bar" style="height:${h}px;background:${color};opacity:${day===today?1:0.45}"></div>`;
    }).join('');
    const recent2 = (d.byDay[today]||0) + (d.byDay[yesterday]||0);
    const older5 = days7.slice(0,5).reduce((s,day)=>s+(d.byDay[day]||0),0);
    const trend = recent2 > older5 * 0.7 ? 'up' : recent2 === 0 && older5 > 0 ? 'down' : 'flat';
    const trendLabel = trend==='up' ? '↑ Subindo' : trend==='down' ? '↓ Caindo' : '→ Estável';
    const isSel = d.domain === selectedDomain;
    return `<div class="d-row${isSel?' sel':''}" onclick="selectDomain('${e(d.domain)}')">
      <div class="d-rank">${i+1}</div>
      <div class="d-favicon" style="background:${color}">${letter}</div>
      <div class="d-info">
        <div class="d-name" title="${e(d.domain)}">${e(d.domain)}</div>
        <div class="d-spark">${sparkBars}</div>
      </div>
      <div class="d-count">
        <div class="d-count-num">${d.ads.length}</div>
        <div class="d-count-lbl">ads</div>
        <div class="d-trend ${trend}">${trendLabel}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('domain-table').innerHTML = `
    <div class="d-table-head">Ranking de domínios <span>${data.length} total</span></div>
    ${rows}
  `;
}

function renderDomainDetail(d) {
  if (!d) return;
  const days = getLastNDays(chartDays);
  const counts = days.map(day => d.byDay[day] || 0);
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];
  const recentCount = (d.byDay[today]||0) + (d.byDay[yesterday]||0);
  const color = getDomainColor(d.domain);

  document.getElementById('d-chart-title').textContent = d.domain;
  document.getElementById('d-chart-sub').textContent = `Ads capturados nos últimos ${chartDays} dias`;
  document.getElementById('d-total-ads').textContent = d.ads.length;
  document.getElementById('d-today-ads').textContent = '+' + recentCount;

  const labels = days.map(day => {
    const dt = new Date(day + 'T12:00:00');
    return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  });

  if (domainChart) { domainChart.destroy(); domainChart = null; }
  const ctx = document.getElementById('domain-chart').getContext('2d');
  domainChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Ads',
        data: counts,
        backgroundColor: color + '66',
        borderColor: color,
        borderWidth: 2,
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: {
        label: ctx => ` ${ctx.parsed.y} ad${ctx.parsed.y !== 1 ? 's' : ''}`
      }}},
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1, color: '#9ca3af', font:{size:11} }, grid: { color: '#f0f2f5' } },
        x: { ticks: { color: '#9ca3af', font:{size:10}, maxRotation: 45 }, grid: { display: false } }
      }
    }
  });

  // Ads vinculados ao domínio
  const section = document.getElementById('domain-ads-section');
  const grid = document.getElementById('domain-ads-grid');
  if (!d.ads.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  document.getElementById('d-ads-label').textContent = `${d.ads.length} ad${d.ads.length>1?'s':''} vinculado${d.ads.length>1?'s':''} — ${d.domain}`;
  const queueIds = new Set(S.queue.map(a => a.id));
  grid.innerHTML = d.ads.map(ad => buildCard(ad, queueIds.has(ad.id))).join('');
}

function selectDomain(domain) {
  selectedDomain = domain;
  const map = getDomainMap();
  const data = Object.values(map).sort((a,b) => b.ads.length - a.ads.length);
  renderDomainTable(data, map);
  renderDomainDetail(map[domain]);
  // Scroll para o gráfico
  document.getElementById('domain-chart-card').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function setChartDays(n) {
  chartDays = n;
  document.getElementById('ctab-7').classList.toggle('active', n === 7);
  document.getElementById('ctab-30').classList.toggle('active', n === 30);
  if (selectedDomain) {
    const map = getDomainMap();
    if (map[selectedDomain]) renderDomainDetail(map[selectedDomain]);
  }
}

// ── INIT ─────────────────────────────────────────────────
checkAuth();
updateDarkBtn();
</script>
