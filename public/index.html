<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offer Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--card:#fff;--text:#1c1e21;--text2:#606770;--border:#dce1e7;
  --accent:#1877f2;--accent2:#e7f3ff;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,.1);
  --green:#42b883;--red:#e53935;--orange:#fb8c00;
}
.dark{
  --bg:#18191a;--card:#242526;--text:#e4e6ea;--text2:#b0b3b8;
  --border:#3a3b3c;--accent2:#263951;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── TOP NAV ─────────────────────────────────────────────────────────────────── */
.topnav{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:56px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.nav-logo{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-.5px;white-space:nowrap}
.nav-logo span{color:var(--text2);font-weight:400}
.nav-tabs{display:flex;gap:4px;flex:1}
.tab-btn{padding:6px 14px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--accent2);color:var(--accent)}
.tab-btn:hover:not(.active){background:var(--bg)}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.count-badge{background:var(--accent);color:#fff;border-radius:99px;font-size:11px;font-weight:700;padding:2px 8px;min-width:22px;text-align:center}
.theme-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.theme-btn:hover{background:var(--bg)}
.search-wrap{position:relative;flex:1;max-width:280px}
.search-wrap input{width:100%;padding:7px 12px 7px 32px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;pointer-events:none}

/* ── GRID ─────────────────────────────────────────────────────────────────────── */
.grid-wrap{padding:20px 16px;max-width:1400px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

/* ── CARD — Facebook style */
.hub-card{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--border);transition:box-shadow .2s}
.hub-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.14)}

/* Card header */
.card-head{display:flex;align-items:center;gap:10px;padding:12px 12px 8px}
.card-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0;letter-spacing:-.5px}
.card-meta{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.card-sub{font-size:11.5px;color:var(--text2)}
.card-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.adlib-btn{font-size:11px;font-weight:700;padding:5px 10px;border:none;border-radius:6px;background:#e7f3ff;color:#1877f2;cursor:pointer;text-decoration:none;white-space:nowrap;transition:all .15s}
.adlib-btn:hover{background:#1877f2;color:#fff}

/* Card media */
.card-media{width:100%;background:#000;max-height:340px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-media img{width:100%;max-height:340px;object-fit:contain;display:block}
.card-media video{width:100%;max-height:340px;display:block;object-fit:contain}

/* Card copy */
.card-copy{padding:10px 12px 6px;font-size:14px;line-height:1.45;color:var(--text);white-space:pre-wrap;word-break:break-word}
.card-copy.truncated{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.see-more{padding:0 12px 6px;font-size:13px;color:var(--accent);cursor:pointer;font-weight:600;background:none;border:none;text-align:left}
.see-more:hover{text-decoration:underline}

/* Link card */
.card-link{margin:0 12px 8px;border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;align-items:stretch;cursor:pointer;background:var(--bg);transition:background .15s}
.card-link:hover{background:var(--border)}
.link-left{flex:1;padding:10px 12px}
.link-domain{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.link-title{font-size:13.5px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.link-desc{font-size:12px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.link-cta{background:var(--border);color:var(--text);font-size:13px;font-weight:700;padding:0 14px;display:flex;align-items:center;flex-shrink:0;border-left:1px solid var(--border)}

/* Card footer */
.card-foot{padding:8px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--border);margin-top:auto}
.platform-tag{font-size:11px;padding:3px 8px;border-radius:99px;background:var(--accent2);color:var(--accent);font-weight:600}
.card-date{font-size:11px;color:var(--text2);margin-left:auto}
.save-btn{font-size:12px;font-weight:700;padding:5px 12px;border:none;border-radius:6px;background:var(--green);color:#fff;cursor:pointer;transition:all .15s;margin-left:auto}
.save-btn:hover{opacity:.85}
.save-btn.saved{background:var(--border);color:var(--text2);cursor:default}
.delete-btn{font-size:11px;font-weight:700;padding:5px 10px;border:1px solid var(--red);border-radius:6px;background:transparent;color:var(--red);cursor:pointer;transition:all .15s}
.delete-btn:hover{background:var(--red);color:#fff}
.icon-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;text-decoration:none}
.icon-btn:hover{background:var(--bg);color:var(--text)}

/* ── AI PANEL ────────────────────────────────────────────────────────────────── */
.ai-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.ai-overlay.open{display:flex}
.ai-panel{background:var(--card);border-radius:16px;width:min(600px,95vw);max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.ai-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.ai-head h3{flex:1;font-size:16px;font-weight:700}
.ai-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:4px;line-height:1}
.ai-body{flex:1;overflow-y:auto;padding:16px 20px}
.ai-section{margin-bottom:16px}
.ai-section h4{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.ai-section p,.ai-section ul{font-size:14px;line-height:1.6;color:var(--text)}
.ai-section ul{padding-left:18px}
.ai-section li{margin-bottom:4px}
.ai-foot{padding:12px 20px;border-top:1px solid var(--border)}
.ai-foot textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:vertical;min-height:60px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.ai-foot textarea:focus{border-color:var(--accent)}
.ai-send{margin-top:8px;padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:all .15s}
.ai-send:hover{opacity:.9}
.ai-msg{padding:10px 14px;border-radius:10px;font-size:14px;line-height:1.5;margin-bottom:8px}
.ai-msg.user{background:var(--accent);color:#fff;margin-left:20%}
.ai-msg.assistant{background:var(--bg);color:var(--text);margin-right:20%}
.ai-loading{text-align:center;color:var(--text2);font-size:13px;padding:12px}

/* ── VIDEO MODAL ─────────────────────────────────────────────────────────────── */
.vid-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center}
.vid-overlay.open{display:flex}
.vid-panel{position:relative;max-width:900px;width:95vw}
.vid-panel video{width:100%;border-radius:12px;max-height:80vh}
.vid-close{position:absolute;top:-40px;right:0;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1}

/* ── EMPTY STATE ──────────────────────────────────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty p{font-size:14px;line-height:1.5;max-width:360px;margin:0 auto}

/* ── TOAST ────────────────────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#1c1e21;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── FILTERS ──────────────────────────────────────────────────────────────────── */
.filters{padding:0 16px 12px;max-width:1400px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-chip{padding:5px 12px;border:1px solid var(--border);border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);color:var(--text2);transition:all .15s;white-space:nowrap}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-chip:hover:not(.active){background:var(--bg)}
.sort-select{padding:5px 10px;border:1px solid var(--border);border-radius:99px;font-size:12px;font-weight:600;background:var(--card);color:var(--text);cursor:pointer;outline:none}

/* ── RESPONSIVE ───────────────────────────────────────────────────────────────── */
@media(max-width:600px){
  .topnav{padding:0 10px;gap:8px;height:50px}
  .nav-logo{font-size:16px}
  .tab-btn{padding:5px 10px;font-size:12px}
  .grid{grid-template-columns:1fr}
  .grid-wrap{padding:12px 10px}
}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="nav-logo">Offer<span>Hub</span></div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('queue')" id="tab-queue">📥 Fila</button>
    <button class="tab-btn" onclick="switchTab('saved')" id="tab-saved">⭐ Salvos</button>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Buscar anúncios..." id="search-input" oninput="onSearch(this.value)">
    </div>
    <span class="count-badge" id="count-badge">0</span>
    <button class="theme-btn" onclick="toggleTheme()" title="Alternar tema">🌙</button>
  </div>
</nav>

<!-- FILTERS -->
<div class="filters" id="filters-bar">
  <span style="font-size:12px;font-weight:700;color:var(--text2)">Filtrar:</span>
  <button class="filter-chip active" onclick="setFilter('all',this)">Todos</button>
  <button class="filter-chip" onclick="setFilter('video',this)">🎬 Vídeo</button>
  <button class="filter-chip" onclick="setFilter('image',this)">🖼️ Imagem</button>
  <select class="sort-select" id="sort-select" onchange="onSort(this.value)">
    <option value="newest">Mais recentes</option>
    <option value="oldest">Mais antigos</option>
    <option value="az">A→Z</option>
  </select>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="grid" id="ads-grid"></div>
</div>

<!-- AI PANEL -->
<div class="ai-overlay" id="ai-overlay" onclick="closeAI(event)">
  <div class="ai-panel">
    <div class="ai-head">
      <span style="font-size:22px">🤖</span>
      <h3 id="ai-title">Análise de Anúncio</h3>
      <button class="ai-close" onclick="closeAI()">×</button>
    </div>
    <div class="ai-body" id="ai-body"></div>
    <div class="ai-foot">
      <textarea id="ai-input" placeholder="Pergunte algo sobre este anúncio..." rows="2"></textarea>
      <button class="ai-send" onclick="sendAIMsg()">Enviar →</button>
    </div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="vid-overlay" id="vid-overlay" onclick="closeVid(event)">
  <div class="vid-panel">
    <button class="vid-close" onclick="closeVid()">×</button>
    <video id="vid-player" controls playsinline></video>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const S = {
  tab: 'queue',
  filter: 'all',
  sort: 'newest',
  search: '',
  queueAds: [],
  savedAds: [],
  currentAI: null,
  aiMessages: [],
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ─── THEME ────────────────────────────────────────────────────────────────────
function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
  document.querySelector('.theme-btn').textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
}
if(localStorage.getItem('theme')==='dark'){
  document.body.classList.add('dark');
  document.querySelector('.theme-btn').textContent='☀️';
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab){
  S.tab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderGrid();
}

// ─── FILTER / SORT / SEARCH ────────────────────────────────────────────────────
function setFilter(f,el){
  S.filter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}
function onSort(v){ S.sort=v; renderGrid(); }
function onSearch(v){ S.search=v.toLowerCase(); renderGrid(); }

function applyFilters(ads){
  let list=[...ads];
  if(S.filter==='video') list=list.filter(a=>a.videoUrl);
  if(S.filter==='image') list=list.filter(a=>!a.videoUrl && a.imageUrl);
  if(S.search) list=list.filter(a=>(a.advertiser+a.copy+a.linkTitle).toLowerCase().includes(S.search));
  if(S.sort==='newest') list.sort((a,b)=>new Date(b.addedAt||b.createdAt||0)-new Date(a.addedAt||a.createdAt||0));
  if(S.sort==='oldest') list.sort((a,b)=>new Date(a.addedAt||a.createdAt||0)-new Date(b.addedAt||b.createdAt||0));
  if(S.sort==='az') list.sort((a,b)=>(a.advertiser||'').localeCompare(b.advertiser||''));
  return list;
}

// ─── BUILD CARD ────────────────────────────────────────────────────────────────
function buildCard(ad) {
  const isQ = S.tab === 'queue';
  const id = ad.id || '';
  const copy = ad.copy || '';
  const isLong = copy.length > 180;
  const name = ad.advertiser || 'Desconhecido';
  const initials = name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';

  // Media
  let media = '';
  if (ad.videoUrl) {
    media = `<div class="card-media"><video src="${e(ad.videoUrl)}" poster="${e(ad.imageUrl||'')}" controls preload="none"></video></div>`;
  } else if (ad.imageUrl) {
    media = `<div class="card-media"><img src="${e(ad.imageUrl)}" loading="lazy" onerror="this.parentElement.style.display='none'" alt=""></div>`;
  }

  // Link card (Facebook style)
  let link = '';
  if (ad.linkTitle || ad.linkDesc || (ad.snapshotUrl && !ad.snapshotUrl.includes('facebook.com/ads/library'))) {
    let domain = '';
    try { domain = new URL(ad.snapshotUrl||'http://x').hostname.replace('www.',''); } catch {}
    const ctaLabel = ad.ctaText || 'Saiba mais';
    link = `<div class="card-link">
      <div class="link-left">
        ${domain?`<div class="link-domain">${e(domain)}</div>`:''}
        ${ad.linkTitle?`<div class="link-title">${e(ad.linkTitle)}</div>`:''}
        ${ad.linkDesc?`<div class="link-desc">${e(ad.linkDesc)}</div>`:''}
      </div>
      ${ctaLabel?`<div class="link-cta">${e(ctaLabel)}</div>`:''}
    </div>`;
  }

  // Ad Library button
  const adlibBtn = ad.adLibraryId
    ? `<a class="adlib-btn" href="https://www.facebook.com/ads/library/?id=${e(ad.adLibraryId)}" target="_blank" title="Ver no Ad Library">📚 Ad Library</a>`
    : '';

  // Action icons
  const actionIcons = `
    ${ad.videoUrl ? `<button class="icon-btn" onclick="openVid('${e(ad.videoUrl)}')" title="Ver vídeo">▶️</button>` : ''}
    <button class="icon-btn" onclick="openAI('${e(id)}')" title="Analisar com IA">🤖</button>
    ${isQ
      ? `<button class="save-btn" onclick="saveAd('${e(id)}')" id="save-${e(id)}">⭐ Salvar</button>`
      : `<button class="delete-btn" onclick="deleteAd('${e(id)}')">🗑️</button>`
    }
  `;

  return `<div class="hub-card" id="card-${e(id)}">
    <div class="card-head">
      <div class="card-avatar">${ad.pageLogo ? `<img src="${e(ad.pageLogo)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.style.display='none';this.parentElement.textContent='${initials}'" alt="">` : initials}</div>
      <div class="card-meta">
        <div class="card-name" title="${e(name)}">${e(name)}</div>
        <div class="card-sub">🌐 Patrocinado · ${e(ad.addedAt||ad.createdAt||'')}</div>
      </div>
      <div class="card-actions">
        ${adlibBtn}
        ${actionIcons}
      </div>
    </div>
    ${copy?`<div class="card-copy${isLong?' truncated':''}" id="copy-${e(id)}">${e(copy)}</div>${isLong?`<button class="see-more" onclick="toggleCopy('${e(id)}')">Ver mais</button>`:''}`:''}
    ${media}
    ${link}
    <div class="card-foot">
      ${(ad.platforms||['facebook']).map(p=>`<span class="platform-tag">${p}</span>`).join('')}
      <span class="card-date">${e(ad.addedAt||ad.createdAt||'')}</span>
    </div>
  </div>`;
}

function toggleCopy(id){
  const el=document.getElementById('copy-'+id);
  const btn=el.nextElementSibling;
  if(el.classList.toggle('truncated')){btn.textContent='Ver mais';}
  else{btn.textContent='Ver menos';}
}

// ─── RENDER GRID ───────────────────────────────────────────────────────────────
function renderGrid(){
  const grid=document.getElementById('ads-grid');
  const badge=document.getElementById('count-badge');
  const items=applyFilters(S.tab==='queue'?S.queueAds:S.savedAds);
  badge.textContent=S.tab==='queue'?S.queueAds.length:S.savedAds.length;
  if(items.length===0){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1">
      <div class="icon">${S.tab==='queue'?'📥':'⭐'}</div>
      <h3>${S.tab==='queue'?'Fila vazia':'Nenhum anúncio salvo'}</h3>
      <p>${S.tab==='queue'
        ?'A extensão vai capturar anúncios automaticamente.'
        : 'Salve ads da fila para analisar com IA e acompanhar os melhores.'}</div>
    </div>`;
    return;
  }
  grid.innerHTML = items.map(ad => buildCard(ad)).join('');
}

// ─── DATA LOADING ──────────────────────────────────────────────────────────────
async function loadQueue(){
  try{
    const r=await fetch('/api/queue');
    S.queueAds=await r.json();
    renderGrid();
  }catch(err){console.error('Queue load error:',err);}
}
async function loadSaved(){
  try{
    const r=await fetch('/api/saved');
    S.savedAds=await r.json();
  }catch(err){console.error('Saved load error:',err);}
}

// ─── SAVE / DELETE ─────────────────────────────────────────────────────────────
async function saveAd(id){
  const ad=S.queueAds.find(a=>a.id===id);
  if(!ad)return;
  try{
    const r=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer no-auth'},body:JSON.stringify(ad)});
    if(r.ok){
      const btn=document.getElementById('save-'+id);
      if(btn){btn.textContent='✅ Salvo';btn.classList.add('saved');btn.disabled=true;}
      toast('✅ Anúncio salvo!');
      S.savedAds.push(ad);
    }
  }catch(err){toast('Erro ao salvar');}
}
async function deleteAd(id){
  try{
    await fetch(`/api/saved/${id}`,{method:'DELETE',headers:{'Authorization':'Bearer no-auth'}});
    S.savedAds=S.savedAds.filter(a=>a.id!==id);
    document.getElementById('card-'+id)?.remove();
    toast('🗑️ Removido');
  }catch(err){toast('Erro ao remover');}
}

// ─── VIDEO MODAL ───────────────────────────────────────────────────────────────
function openVid(url){
  document.getElementById('vid-player').src=url;
  document.getElementById('vid-overlay').classList.add('open');
}
function closeVid(ev){
  if(ev&&ev.target!==document.getElementById('vid-overlay'))return;
  document.getElementById('vid-overlay').classList.remove('open');
  document.getElementById('vid-player').src='';
}

// ─── AI PANEL ──────────────────────────────────────────────────────────────────
function openAI(id){
  const ad=S.queueAds.find(a=>a.id===id)||S.savedAds.find(a=>a.id===id);
  if(!ad)return;
  S.currentAI=ad;
  S.aiMessages=[];
  document.getElementById('ai-title').textContent='🤖 '+ad.advertiser;
  const body=document.getElementById('ai-body');
  body.innerHTML=`<div class="ai-loading">Analisando anúncio...</div>`;
  document.getElementById('ai-overlay').classList.add('open');
  analyzeAd(ad);
}
function closeAI(ev){
  if(ev&&ev.target!==document.getElementById('ai-overlay'))return;
  document.getElementById('ai-overlay').classList.remove('open');
}

async function analyzeAd(ad){
  const prompt=`Analise este anúncio do Facebook de forma breve e objetiva:

Anunciante: ${ad.advertiser}
Texto: ${ad.copy||'(sem texto)'}
Título do link: ${ad.linkTitle||''}
Descrição: ${ad.linkDesc||''}
Tipo: ${ad.videoUrl?'Vídeo':'Imagem'}

Responda em português com:
1. **Gancho**: qual é o gancho principal?
2. **Oferta**: o que está sendo oferecido?
3. **Público**: para quem parece ser?
4. **Pontos fortes**: 2-3 elementos que funcionam bem
5. **Nota geral**: /10`;

  try{
    const r=await fetch('/api/ai',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer no-auth'},
      body:JSON.stringify({messages:[{role:'user',content:prompt}]})
    });
    const data=await r.json();
    const reply=data.reply||data.content||data.choices?.[0]?.message?.content||'Erro ao analisar';
    S.aiMessages=[{role:'assistant',content:reply}];
    renderAIBody();
  }catch(err){
    document.getElementById('ai-body').innerHTML=`<div class="ai-msg assistant">Erro ao conectar com IA: ${err.message}</div>`;
  }
}

async function sendAIMsg(){
  const input=document.getElementById('ai-input');
  const msg=input.value.trim();
  if(!msg||!S.currentAI)return;
  input.value='';
  const ad=S.currentAI;
  S.aiMessages.push({role:'user',content:msg});

  const context=`Contexto do anúncio - Anunciante: ${ad.advertiser}, Texto: ${ad.copy||''}, Título: ${ad.linkTitle||''}`;
  const msgs=[{role:'user',content:context+'

'+S.aiMessages[0]?.content},...S.aiMessages.slice(1),{role:'user',content:msg}];

  S.aiMessages.push({role:'assistant',content:'...'});
  renderAIBody();

  try{
    const r=await fetch('/api/ai',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer no-auth'},
      body:JSON.stringify({messages:msgs})
    });
    const data=await r.json();
    const reply=data.reply||data.content||data.choices?.[0]?.message?.content||'?';
    S.aiMessages[S.aiMessages.length-1]={role:'assistant',content:reply};
    renderAIBody();
  }catch(err){
    S.aiMessages[S.aiMessages.length-1]={role:'assistant',content:'Erro: '+err.message};
    renderAIBody();
  }
}

function renderAIBody(){
  const body=document.getElementById('ai-body');
  body.innerHTML=S.aiMessages.map(m=>`<div class="ai-msg ${m.role}">${m.content.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>`).join('');
  body.scrollTop=body.scrollHeight;
}

// ─── AUTH ──────────────────────────────────────────────────────────────────────
async function checkAuth(){
  // No auth required (token = no-auth)
  await Promise.all([loadQueue(), loadSaved()]);
}

// ─── INIT ──────────────────────────────────────────────────────────────────────
checkAuth();
